<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chat App</title>
    <link rel="stylesheet" href="./css/style.css"/>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div>Chat</div>
        <div>Status: <span id="status" class="disconnected">Disconnected</span></div>
    </div>

    <div class="login-bar">
        <input id="username" placeholder="username"/>
        <input id="password" type="password" placeholder="password"/>
        <button id="loginBtn">Login</button>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-bar">
        <input id="msgBox" type="text" placeholder="Type a message"/>
        <button id="imgBtn" class="img-btn" title="Send image">📷</button>
        <button id="sendBtn" class="send-btn" title="Send message">➤</button>
        <input id="imageInput" type="file" accept="image/*" hidden/>
    </div>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
