<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Chat App</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #e5ddd5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            width: 400px;
            height: 85vh;
            background: #fff;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .app-header {
            background: #075e54;
            color: white;
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .login-bar {
            background: #f0f2f5;
            padding: 10px;
            display: flex;
            gap: 6px;
            border-bottom: 1px solid #ddd;
        }

        .login-bar input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        .login-bar button {
            padding: 8px 12px;
            border: none;
            background: #128c7e;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .chat {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bubble {
            max-width: 75%;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.08);
        }

        .bubble-in {
            align-self: flex-start;
            background: white;
        }

        .bubble-out {
            align-self: flex-end;
            background: #dcf8c6;
        }

        .sender {
            font-size: 11px;
            font-weight: bold;
            color: #555;
            margin-bottom: 4px;
        }

        .bubble img {
            max-width: 100%;
            border-radius: 8px;
            display: block;
        }

        .input-bar {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #f0f2f5;
            border-top: 1px solid #ddd;
        }

        .input-bar input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 999px;
            outline: none;
        }

        .send-btn,
        .img-btn {
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn {
            background: #128c7e;
        }

        .img-btn {
            background: #25d366;
        }

        #status {
            font-weight: bold;
        }

        #status.connected {
            color: #c3f;
        }

        #status.disconnected {
            color: #fbb;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div>Chat</div>
        <div>Status: <span id="status" class="disconnected">Disconnected</span></div>
    </div>

    <div class="login-bar">
        <input id="username" placeholder="username"/>
        <input id="password" type="password" placeholder="password"/>
        <button id="loginBtn">Login</button>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-bar">
        <input id="msgBox" type="text" placeholder="Type a message"/>
        <button id="imgBtn" class="img-btn">📷</button>
        <button id="sendBtn" class="send-btn">➤</button>
        <input id="imageInput" type="file" accept="image/*" style="display:none"/>
    </div>
</div>

<script>
    let ws = null;
    let token = null;

    // گرفتن المنت‌ها به شکل استاندارد
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const chatDiv = document.getElementById("chat");
    const statusSpan = document.getElementById("status");
    const msgBox = document.getElementById("msgBox");
    const imgBtn = document.getElementById("imgBtn");
    const sendBtn = document.getElementById("sendBtn");
    const imageInput = document.getElementById("imageInput");

    // ---------------- LOGIN ----------------
    async function login() {
        const u = usernameInput.value.trim();
        const p = passwordInput.value.trim();

        if (!u || !p) {
            alert("Please enter username and password");
            return;
        }

        try {
            const res = await fetch(
                `http://127.0.0.1:8000/login?username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`,
                {method: "POST"}
            );

            if (!res.ok) {
                alert("Login failed");
                return;
            }

            const data = await res.json();
            token = data.token;
            localStorage.setItem("token", token);

            await loadHistory();
            connectWS();
        } catch (err) {
            console.error("Login error:", err);
            alert("Login error, check console");
        }
    }

    // ---------------- LOAD HISTORY ----------------
    async function loadHistory() {
        try {
            const res = await fetch("http://127.0.0.1:8000/messages");
            if (!res.ok) {
                console.error("Failed to load history");
                return;
            }
            const list = await res.json();

            chatDiv.innerHTML = "";

            list.forEach(msg => {
                const mine = msg.sender === usernameInput.value.trim();
                addBubble(msg.sender, msg.type, msg.content, mine);
            });

            chatDiv.scrollTop = chatDiv.scrollHeight;
        } catch (err) {
            console.error("History error:", err);
        }
    }

    // ---------------- CONNECT WEBSOCKET ----------------
    function connectWS() {
        if (!token) {
            console.warn("No token, cannot open WebSocket");
            return;
        }

        ws = new WebSocket(`ws://127.0.0.1:8000/ws/chat?token=${encodeURIComponent(token)}`);

        ws.onopen = () => {
            statusSpan.textContent = "Connected";
            statusSpan.classList.remove("disconnected");
            statusSpan.classList.add("connected");
        };

        ws.onclose = () => {
            statusSpan.textContent = "Disconnected";
            statusSpan.classList.remove("connected");
            statusSpan.classList.add("disconnected");
        };

        ws.onerror = (e) => {
            console.error("WebSocket error:", e);
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                const mine = data.sender === usernameInput.value.trim();
                addBubble(data.sender, data.type, data.content, mine);
            } catch (err) {
                console.error("WS message parse error:", err);
            }
        };
    }

    // ---------------- SEND TEXT ----------------
    function sendText() {
        const text = msgBox.value.trim();
        if (!text) return;

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert("WebSocket not connected");
            return;
        }

        const payload = {
            type: "text",
            content: text
        };

        ws.send(JSON.stringify(payload));
        msgBox.value = "";

    }

    // ---------------- SEND IMAGE ----------------
    function pickImage() {
        imageInput.value = "";
        imageInput.click();
    }

    function sendImage() {
        const file = imageInput.files[0];
        if (!file) return;

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert("WebSocket not connected");
            return;
        }

        const reader = new FileReader();

        reader.onload = () => {
            const base64 = reader.result;

            const payload = {
                type: "image",
                content: base64
            };

            ws.send(JSON.stringify(payload));

        };

        reader.readAsDataURL(file);
    }

    // ---------------- DISPLAY BUBBLE ----------------
    function addBubble(sender, type, content, mine) {
        const div = document.createElement("div");
        div.classList.add("bubble");
        div.classList.add(mine ? "bubble-out" : "bubble-in");

        if (type === "text") {
            const spanSender = document.createElement("div");
            spanSender.classList.add("sender");
            if (!mine) {
                spanSender.textContent = sender;
                div.appendChild(spanSender);
            }
            const textNode = document.createElement("div");
            textNode.textContent = content;
            div.appendChild(textNode);
        } else if (type === "image") {
            if (!mine) {
                const spanSender = document.createElement("div");
                spanSender.classList.add("sender");
                spanSender.textContent = sender;
                div.appendChild(spanSender);
            }
            const img = document.createElement("img");
            img.src = content.startsWith("/uploads")
                ? "http://127.0.0.1:8000" + content
                : content;
            div.appendChild(img);
        }

        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    // ---------------- EVENTS ----------------
    loginBtn.addEventListener("click", login);

    msgBox.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            sendText();
        }
    });

    sendBtn.addEventListener("click", sendText);
    imgBtn.addEventListener("click", pickImage);
    imageInput.addEventListener("change", sendImage);
</script>

</body>
</html>
